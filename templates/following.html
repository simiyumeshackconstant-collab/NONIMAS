<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<meta
    name="csrf-token"
    content="{{ csrf_token() }}"
>

<title>Following</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b0018;
    color:white;
    font-family:Arial,sans-serif;
}

/* HEADER */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:14px 18px;

    background:#12002b;

    border-bottom:1px solid #2de2e6;

    position:sticky;
    top:0;
    z-index:100;
}

/* BUTTONS */

.top-btn{
    background:#1f0045;

    border:none;

    color:white;

    padding:10px 14px;

    border-radius:10px;

    cursor:pointer;

    font-size:14px;
}

/* TITLE */

.title{
    font-size:18px;
    font-weight:bold;
    color:#7cf7ff;
}

/* CONTAINER */

.container{
    max-width:650px;
    margin:auto;
    padding:15px;
}

/* USER CARD */

.user-card{
    display:flex;
    align-items:center;
    gap:14px;

    background:#140030;

    border:1px solid #2de2e6;

    border-radius:15px;

    padding:12px;

    margin-bottom:14px;

    cursor:pointer;

    transition:.2s;
}

.user-card:hover{
    background:#1a0040;
    transform:scale(1.01);
}

/* AVATAR */

.avatar{
    width:60px;
    height:60px;

    border-radius:50%;

    object-fit:cover;

    border:2px solid #2de2e6;

    background:black;

    flex-shrink:0;
}

/* INFO */

.info{
    flex:1;
    min-width:0;
}

/* NAME */

.name{
    color:#7cf7ff;

    font-size:16px;

    font-weight:bold;
}

/* BIO */

.bio{
    font-size:13px;

    color:#b7b7b7;

    margin-top:4px;

    overflow:hidden;

    text-overflow:ellipsis;

    white-space:nowrap;
}

/* EMPTY */

.empty{
    text-align:center;

    margin-top:50px;

    color:#888;

    font-size:15px;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

    <button
        class="top-btn"
        onclick="history.back()"
    >
        ← Back
    </button>

    <div class="title">
        Following
    </div>

    <button
        class="top-btn"
        onclick="location.href='/'"
    >
        🏠
    </button>

</div>

<!-- USERS -->

<div class="container">

{% if users %}

    {% for u in users %}

    <div
        class="user-card"
        onclick="openProfile('{{ u.id }}')"
    >

        <img
            src="/uploads/user_dp_pics/{{ u.user_dp_pic or 'default_avatar.png' }}"
            class="avatar"
            onerror="this.src='/uploads/user_dp_pics/default_avatar.png'"
        >

        <div class="info">

            <div class="name">
                {{ u.full_name }}
            </div>

            <div class="bio">
                {{ u.bio or 'No bio yet' }}
            </div>

        </div>

    </div>

    {% endfor %}

{% else %}

    <div class="empty">
        Not following anyone yet
    </div>

{% endif %}

</div>

<script>

function openProfile(id){

    window.location.href =
        "/user/" + id;
}

</script>

</body>
</html>
