<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nonimas</title>

<style>
body{
    background:#0b0018;
    color:white;
    font-family:Arial;
    margin:0;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:45px 20px 15px 20px;

    background:#12002b;
    border-bottom:1px solid #2de2e6;

    position:sticky;
    top:0;
    z-index:1000;
}

.logo{color:#7cf7ff;font-size:20px}

.top-btn{
    background:#1f0045;
    border:none;
    color:white;
    padding:8px 12px;
    border-radius:8px;
    margin-left:10px;
    cursor:pointer;
}

.main{
    display:flex;
    width:100%;
}

/* Sidebar (left like Facebook) */
.sidebar{
    width:280px;
    padding:15px;
}

/* Feed should TAKE ALL REMAINING SPACE */

.feed-container{
    flex:1;

    padding:30px 15px 15px 15px;

    max-width:800px;
    margin:0 auto;
}

textarea{
    width:100%;
    background:#140030;
    border:1px solid #2de2e6;
    border-radius:10px;
    color:white;
    padding:10px;
    margin-bottom:10px;
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#2de2e6,#7b2ff7);
    color:white;
    cursor:pointer;
}
.media-btn{
    width:100%;
    padding:12px;
    margin-bottom:10px;

    border:none;
    border-radius:10px;

    background:#1f0045;
    color:white;

    font-size:15px;
    cursor:pointer;

    border:1px solid #2de2e6;
}
.post{
    background:#140030;
    border:1px solid #2de2e6;
    border-radius:14px;
    padding:18px;
    margin:15px 0;
    width:100%;
    box-sizing:border-box;
}
.actions{
    display:flex;
    justify-content:space-between;
    margin-top:12px;
    gap:10px;
}


.small-btn{
    flex:1;
    background:#1f0045;
    border:none;
    color:white;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
}


.section-box{
    background:#140030;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
    border:1px solid #2de2e6;
}

.comment-box{
    margin-top:10px;
    background:#0f0020;
    padding:10px;
    border-radius:10px;
}

.comment-input{
    width:100%;
    padding:8px;
    border-radius:8px;
    border:1px solid #2de2e6;
    background:#140030;
    color:white;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="header">
    <button class="top-btn" onclick="location.href='/dp'">👤</button>
     <button class="top-btn" onclick="location.href='/wallet_page'">
    💰
     </button>
    <div class="brand">
        <img src="/static/nonimas_logo.png" alt="Nonimas Logo" style="width:80px;vertical-align:middle;">
         <span style="margin-left:10px;font-size:20px;color:#7cf7ff;"></span>
    </div>
        <button class="top-btn" onclick="location.href='/chat_page'">💬</button>
        <button class="top-btn" onclick="location.href='/buddies_page'">👤👤</button>
</div>

<div class="main">


<!-- FEED -->
<div class="feed-container">

    <textarea id="content" placeholder="Post anonymously..."></textarea>
    <button class="media-btn" onclick="openMediaPicker()">
        📷 Files
    </button>
    <div id="selected-file" style="margin-bottom:10px;color:#7cf7ff;"></div>
    <input
        type="file"
        id="file"
        accept=".png,.jpg,.jpeg,.webp,.apk,.heic,.heif,video/*"
        style="display:none;"
    >
    <button class="btn" onclick="createPost()">Post</button>

    <div id="feed"></div>

</div>

</div>

<script>

let user_id = {{ session.get('user_id', 0) | tojson }};

/* CREATE POST */
async function createPost(){

    let contentInput = document.getElementById("content");
    let fileInput = document.getElementById("file");

    let content = contentInput.value.trim();

    if(!content && fileInput.files.length === 0){
        return;
    }

    let fd = new FormData();

    fd.append("content", content);

    if(fileInput.files.length > 0){
        fd.append("file", fileInput.files[0]);
    }

    try{

        // 🚀 instant loading UI
        const tempId = "temp-" + Date.now();

        let previewMedia = "";

        if(fileInput.files.length > 0){

            const file = fileInput.files[0];

            const localURL = URL.createObjectURL(file);

            if(file.type.startsWith("image/")){

                previewMedia = `<img src="${localURL}">`;
            }

            else if(file.type.startsWith("video/")){

                previewMedia = `
                <video controls>
                    <source src="${localURL}">
                </video>`;
            }
        }

        // 🚀 show instantly before upload finishes
        const feed = document.getElementById("feed");

        feed.innerHTML = `
        <div class="post" id="${tempId}" style="opacity:0.7">

            <p>${content}</p>

            ${previewMedia}

            <div class="actions">

                <button class="small-btn">❤️ 0</button>

                <button class="small-btn">💬 0</button>

                <button class="small-btn">🎁 0</button>

            </div>

            <div style="margin-top:10px;color:#7cf7ff;">
                Posting...
            </div>

        </div>
        ` + feed.innerHTML;

        // ✅ upload
        let res = await fetch("/create_post",{
            method:"POST",
            body:fd
        });

        let data = await res.json();

        if(data.success){

            // clear form FAST
            contentInput.value = "";
            fileInput.value = "";

            // remove temporary post
            const tempPost = document.getElementById(tempId);

            if(tempPost){
                tempPost.remove();
            }

            // load real updated posts
            loadPosts();
        }

    }catch(err){

        console.error(err);
    }
}

function openMediaPicker(){
    document.getElementById("file").click();
}
document.getElementById("file").addEventListener("change", function(){

    let file = this.files[0];

    if(file){
        document.getElementById("selected-file").innerHTML =
            "Selected: " + file.name;
    }
});
/* LIKE POST */
function likePost(postId){
    fetch("/like_post",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({post_id:postId})
    })
    .then(r=>r.json())
    .then(data=>{
        const btn = document.querySelector(`#like-btn-${postId}`);

        if(btn){
            btn.innerHTML = `❤️ ${data.count}`;
        }
    });
}

/* LOAD COMMENTS */
function loadComments(postId){

    let box = document.getElementById(`comments-${postId}`);

    fetch(`/comments/${postId}`)
    .then(r=>r.json())
    .then(data=>{

        box.innerHTML = "";

        data.forEach(c=>{
            box.innerHTML += `
                <div class="section-box">
                    <b>${c.name}</b><br>
                    ${c.comment}
                </div>
            `;
        });

        box.innerHTML += `
            <input class="comment-input" id="input-${postId}" placeholder="Write comment...">
            <button class="small-btn" onclick="addComment(${postId})">Send</button>
        `;
    });
}

/* ADD COMMENT */
function addComment(postId){

    let text = document.getElementById(`input-${postId}`).value;

    fetch("/add_comment",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            post_id:postId,
            comment:text
        })
    })
    .then(r=>r.json())
    .then(data=>{

        const btn = document.querySelector(`#comment-btn-${postId}`);

        if(btn){
            btn.innerHTML = `💬 ${data.count}`;
        }

        loadComments(postId);
    });
}
/* 🎁 GIFT COUNT HELPER */
async function getGiftCount(postId){
    let res = await fetch(`/gift_count/${postId}`);
    let data = await res.json();
    return data.count;
}
/* POSTS */
async function loadPosts(){

    let res = await fetch("/posts");
    let data = await res.json();

    let feed = document.getElementById("feed");
    feed.innerHTML = "";

    for (let p of data){

        let media = "";

        if(p.media){

            if(p.type === "image"){
                media = `
                <img src="${p.media}?t=${Date.now()}" style="
                    width:100%;
                    max-height:500px;
                    object-fit:cover;
                    border-radius:10px;
                    margin-top:10px;
                ">`;
            }

            else if(p.type === "video"){
                media = `
                <video controls style="
                    width:100%;
                    border-radius:10px;
                    margin-top:10px;
                ">
                    <source src="${p.media}" type="video/mp4">
                </video>`;
            }

            else{
                media = `
                <a href="${p.media}" target="_blank">
                    Download File
                </a>`;
            }
        }

        // 🎁 GET TOTAL GIFTS
        let giftCount = await getGiftCount(p.id);

        feed.innerHTML += `
        <div class="post">
            <p>${p.content}</p>
            ${media}

            <div class="actions">

                <button
                    id="like-btn-${p.id}"
                    class="small-btn"
                    onclick="likePost(${p.id})">
                    ❤️ ${p.likes}
                </button>

                <button id="comment-btn-${p.id}"
                    class="small-btn"
                    onclick="loadComments(${p.id})">
                    💬 ${p.comments}
                </button>

                <button id="gift-btn-${p.id}"
                    data-count="${giftCount}"
                    class="small-btn"
                    onclick="toggleGiftBox(${p.id},${p.user})">
                    🎁 ${giftCount}
                </button>

            </div>

            <div id="gift-box-${p.id}" style="display:none;margin-top:10px;"></div>

            <div id="comments-${p.id}" class="comment-box"></div>
        </div>`;
    }
}

/* GIFT BOX */
function toggleGiftBox(postId, receiverId){

    let box = document.getElementById(`gift-box-${postId}`);

    if(box.style.display==="block"){
        box.style.display="none";
        return;
    }

    box.style.display="block";
    box.innerHTML="Loading...";

    fetch("/gifts")
    .then(r=>r.json())
    .then(gifts=>{
        box.innerHTML="";

        gifts.forEach(g=>{
            box.innerHTML += `
                <div class="section-box">
                    <b>${g.name}</b>
                    <button class="small-btn" onclick="sendGift(${postId},${receiverId},${g.id})">
                        Send
                    </button>
                </div>
            `;
        });
    });
}

/* SEND GIFT */
function sendGift(postId, receiverId, giftId){

    fetch("/check_gift_access",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({gift_id:giftId})
    })
    .then(r => r.json())
    .then(res => {

        // ❌ NOT ALLOWED → REDIRECT TO BUY PAGE
        if(!res.allowed){
            alert("You don't have gifts. Redirecting to shop...");

            window.location.href = res.redirect || "/buy_gift_page";
            return;
        }

        // ✅ SEND GIFT
        return fetch("/send_gift",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                post_id:postId,
                gift_id:giftId,
                quantity:1
            })
        });

    })
    .then(r => {
        if (!r) return; // stop if redirected earlier
        return r.json();
    })
    .then(data => {

        if (!data) return;

        // ⚠️ SERVER REDIRECT (important fix)
        if (data.redirect){
            window.location.href = data.redirect;
            return;
        }

        if (data.error){
            alert(data.error);
            return;
        }

        // ✅ success
        const giftBtn = document.querySelector(`#gift-btn-${postId}`);

        if(giftBtn){

            let current = parseInt(
                giftBtn.dataset.count || "0"
            );

            current++;

            giftBtn.dataset.count = current;

            giftBtn.innerHTML = `🎁 ${current}`;
    }
    })
    .catch(err => {
        console.error("Gift error:", err);
    });
}

/* INITIAL LOAD */
loadPosts();
</script>
</body>
<!-- INSTALL APP CARD -->
<div id="install-card">

    <div id="install-card" style="display:none;">

        <img
            src="/static/nonimas_logo.png"
            class="install-logo"
        >

        <div class="install-text">
            <h3>Install Nonimas App</h3>
            <p>Faster access. Better experience.</p>
        </div>

    </div>

    <div class="install-actions">

        <a href="{{ url_for('static', filename='nonimas.apk') }}"
            download="nonimas.apk"
            class="install-btn">
            Download APK
        </a>

        <button class="later-btn" onclick="hideInstallCard()">
            Continue Web
        </button>

    </div>

</div>

<style>

#install-card{

    position:fixed;

    bottom:20px;
    left:20px;
    right:20px;

    background:linear-gradient(
        135deg,
        #140030,
        #1f0045
    );

    border:1px solid #2de2e6;

    border-radius:18px;

    padding:18px;

    z-index:99999;

    box-shadow:
        0 0 20px rgba(45,226,230,0.25);

    animation:slideUp 0.4s ease;

    max-width:500px;

    margin:auto;
}

.install-content{
    display:flex;
    align-items:center;
    gap:15px;
}

.install-logo{
    width:60px;
    height:60px;
    border-radius:14px;
}

.install-text h3{
    margin:0;
    color:#7cf7ff;
    font-size:18px;
}

.install-text p{
    margin-top:5px;
    color:#ddd;
    font-size:14px;
}

.install-actions{
    display:flex;
    gap:10px;
    margin-top:18px;
}

.install-btn{

    flex:1;

    text-align:center;

    padding:12px;

    border-radius:12px;

    text-decoration:none;

    font-weight:bold;

    background:linear-gradient(
        45deg,
        #2de2e6,
        #7b2ff7
    );

    color:white;
}

.later-btn{

    flex:1;

    border:none;

    border-radius:12px;

    background:#0f0020;

    color:white;

    cursor:pointer;
}

@keyframes slideUp{

    from{
        transform:translateY(100px);
        opacity:0;
    }

    to{
        transform:translateY(0);
        opacity:1;
    }
}

/* MOBILE */

@media(max-width:600px){

    #install-card{
        left:10px;
        right:10px;
        bottom:10px;
    }

    .install-actions{
        flex-direction:column;
    }
}
</style>

<script>

function showInstallCard(){

    const hidden = localStorage.getItem("nonimas_install_hidden");

    if(hidden === "yes") return;

    document.getElementById("install-card").style.display = "block";
}

function hideInstallCard(){

    document.getElementById("install-card").style.display = "none";

    localStorage.setItem("nonimas_install_hidden", "yes");
}

/* show ONLY after full page load + delay */
window.addEventListener("load", ()=>{

    setTimeout(()=>{

        showInstallCard();

    }, 1500); // gives user time to see page first

});

</script>

</html>
