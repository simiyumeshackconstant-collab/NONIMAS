<!DOCTYPE html>
<html>
<head>
<title>Deposit</title>
<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0018;
    color:white;
}
.box{
    width:400px;
    margin:80px auto;
    background:#140030;
    border:1px solid #2de2e6;
    padding:30px;
    border-radius:15px;
}
h2{
    text-align:center;
    color:#7cf7ff;
}
input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#1f0045;
    color:white;
    box-sizing:border-box;
}
button{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#2de2e6,#7b2ff7);
    color:white;
    cursor:pointer;
}
.balance{
    text-align:center;
    margin:20px 0;
    font-size:20px;
}
</style>
</head>
<body>

<div class="box">
    <h2>Deposit Funds</h2>

    <div class="balance">
        Balance: <b>${{ wallet.balance }}</b>
    </div>

    <form method="POST">
        <input type="number" step="0.01" name="amount" placeholder="Enter amount" required>
        <button type="submit">Deposit</button>
    </form>
</div>

</body>
</html>
