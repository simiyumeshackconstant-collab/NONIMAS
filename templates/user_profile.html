<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ user.full_name }}</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f10;
    color:white;
    font-family:Arial,sans-serif;
}

/* COVER */

.cover{
    height:170px;

    background:
    linear-gradient(
        135deg,
        #2de2e6,
        #5b00ff,
        #12002b
    );

    border-bottom-left-radius:25px;
    border-bottom-right-radius:25px;

    position:relative;
}

/* BACK BUTTON */

.back-btn{
    position:absolute;
    top:15px;
    left:15px;

    border:none;

    background:rgba(0,0,0,.4);

    color:white;

    padding:10px 15px;

    border-radius:12px;

    cursor:pointer;
}

/* MAIN */

.wrapper{
    max-width:850px;
    margin:auto;

    padding:0 15px 30px;
}

/* PROFILE CARD */

.profile-card{
    background:#18191a;

    border-radius:22px;

    margin-top:-55px;

    position:relative;

    z-index:10;

    padding:20px;

    box-shadow:
    0 5px 25px rgba(0,0,0,.4);

    border:1px solid #2a2a2a;
}

/* PROFILE TOP */

.profile-top{
    display:flex;
    align-items:flex-start;
    gap:20px;
}

/* PROFILE PIC */

.avatar{
    width:125px;
    height:125px;

    border-radius:50%;

    object-fit:cover;

    border:5px solid #18191a;

    background:black;

    flex-shrink:0;

    margin-top:-70px;
}

/* INFO */

.profile-info{
    flex:1;
}

/* NAME */

.name{
    font-size:30px;
    font-weight:bold;
}

/* BIO */

.bio{
    color:#b0b3b8;

    margin-top:8px;

    line-height:1.6;
}

/* COUNTS */

.counts{
    display:flex;

    gap:25px;

    margin-top:18px;

    flex-wrap:wrap;
}

.count{
    font-size:15px;
    color:#b0b3b8;
}

.count b{
    color:white;
    font-size:18px;
}

/* ACTIONS */

.actions{
    display:flex;

    gap:12px;

    margin-top:20px;

    flex-wrap:wrap;
}

.btn{
    border:none;

    padding:12px 18px;

    border-radius:10px;

    font-weight:bold;

    cursor:pointer;

    font-size:14px;
}

.primary-btn{
    background:#2374e1;
    color:white;
}

.gray-btn{
    background:#3a3b3c;
    color:white;
}

/* POSTS */

.posts{
    margin-top:20px;
}

/* POST */

.post{
    background:#18191a;

    border-radius:18px;

    padding:16px;

    margin-bottom:20px;

    border:1px solid #2a2a2a;
}

/* POST HEADER */

.post-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.post-name{
    font-size:16px;
    font-weight:bold;
}

.post-time{
    color:#b0b3b8;
    font-size:13px;
}

/* POST CONTENT */

.post-content{
    margin-top:15px;

    line-height:1.7;

    word-break:break-word;
}

/* MEDIA */

.post img,
.post video{
    width:100%;

    margin-top:15px;

    border-radius:15px;

    max-height:600px;

    object-fit:cover;

    background:black;
}

/* EMPTY */

.empty{
    background:#18191a;

    padding:30px;

    border-radius:18px;

    text-align:center;

    color:#b0b3b8;

    border:1px solid #2a2a2a;
}

/* MOBILE */

@media(max-width:700px){

    .profile-top{
        flex-direction:column;
        align-items:center;
        text-align:center;
    }

    .avatar{
        margin-top:-90px;
    }

    .name{
        font-size:25px;
    }

    .counts{
        justify-content:center;
    }

    .actions{
        justify-content:center;
    }

    .btn{
        width:100%;
    }

}

</style>
</head>

<body>

<!-- COVER -->
<div class="cover">

    <button
        class="back-btn"
        onclick="history.back()"
    >
        ← Back
    </button>

</div>

<div class="wrapper">

    <!-- PROFILE CARD -->
    <div class="profile-card">

        <div class="profile-top">

            <!-- PROFILE PIC -->
            <img
                class="avatar"
                src="/uploads/user_dp_pics/{{ user.user_dp_pic or 'default_avatar.png' }}"
                onerror="this.src='/uploads/user_dp_pics/default_avatar.png'"
            >

            <!-- INFO -->
            <div class="profile-info">

                <div class="name">
                    {{ user.full_name }}
                </div>

                <div class="bio">
                    {{ user.bio or "No bio yet." }}
                </div>

                <!-- COUNTS -->
                <div class="counts">

                    <div class="count">
                        <b>{{ followers_count }}</b>
                        Buddies
                    </div>

                    <div class="count">
                        <b>{{ following_count }}</b>
                        Added
                    </div>

                    <div class="count">
                        <b id="postCount">0</b>
                        Posts
                    </div>

                </div>

                <!-- ACTIONS -->
                {% if user.id != session.get("user_id") %}

                <div class="actions">

                    {% if is_mutual %}

                        <button class="btn gray-btn">
                            ✓ Buddies
                        </button>

                    {% elif i_added %}

                        <button class="btn gray-btn">
                            ✓ Added
                        </button>

                    {% elif added_me %}

                        <button
                            class="btn primary-btn"
                            onclick="addBuddy({{ user.id }})"
                        >
                            Add Buddy Back
                        </button>

                    {% else %}

                        <button
                            class="btn primary-btn"
                            onclick="addBuddy({{ user.id }})"
                        >
                            Add Buddy
                        </button>

                    {% endif %}

                    <button
                        class="btn gray-btn"
                        onclick="openChat({{ user.id }})"
                    >
                        Message
                    </button>

                </div>

                {% endif %}

            </div>

        </div>

    </div>

    <!-- POSTS -->
    <div
        class="posts"
        id="posts"
    ></div>

</div>

<script>

const profileUserId = Number("{{ user.id }}");

/* LOAD POSTS */

function loadPosts(){

    fetch("/posts")
    .then(r => r.json())
    .then(posts => {

        const userPosts = posts.filter(
            p => Number(p.user) === profileUserId
        );

        document.getElementById("postCount").innerText =
            userPosts.length;

        if(userPosts.length === 0){

            document.getElementById("posts").innerHTML =

            `
            <div class="empty">
                No posts yet.
            </div>
            `;

            return;
        }

        document.getElementById("posts").innerHTML =

        userPosts.map(p => `

            <div class="post">

                <div class="post-header">

                    <div class="post-name">
                        {{ user.full_name }}
                    </div>

                    <div class="post-time">
                        Post
                    </div>

                </div>

                ${
                    p.content ?

                    `
                    <div class="post-content">
                        ${p.content}
                    </div>
                    `

                    : ""
                }

                ${
                    p.media ?

                    p.type === "video"

                    ?

                    `
                    <video controls>
                        <source src="${p.media}">
                    </video>
                    `

                    :

                    `
                    <img src="${p.media}">
                    `

                    : ""
                }

            </div>

        `).join("");

    });

}

/* ADD BUDDY */

function addBuddy(id){

    fetch("/add_buddy",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            buddy_id:id
        })

    })
    .then(r => r.json())
    .then(d => {

        if(d.success){

            location.reload();

        }else{

            alert(d.error || "Failed");
        }

    });

}

/* CHAT */

function openChat(id){

    window.location.href =
        `/chat_page?user=${id}`;
}

/* INIT */

loadPosts();

</script>

</body>
</html>
