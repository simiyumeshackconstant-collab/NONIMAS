<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0b0018;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:90%;
    max-width:400px;
    background:#12002b;
    padding:20px;
    border-radius:15px;
    border:1px solid #2de2e6;
    text-align:center;
}

h2{
    color:#7cf7ff;
    margin-bottom:20px;
}

img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:3px solid #2de2e6;
    object-fit:cover;
    margin-bottom:15px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#1f0045;
    color:white;
}

textarea{
    resize:none;
    height:80px;
}

button{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:25px;
    background:#2de2e6;
    color:black;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:0.9;
}

.flash{
    margin-bottom:10px;
    color:#7cf7ff;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

    <h2>My Profile</h2>

    <!-- PROFILE PICTURE -->
    <img src="/uploads/user_dp/{{ user.user_dp_pic }}"
         onerror="this.src='/uploads/user_dp/default_avatar.png'">

    <!-- FLASH MESSAGE -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">
            {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <!-- FORM -->
    <form method="POST" enctype="multipart/form-data">

        <input type="text"
               name="full_name"
               value="{{ user.full_name }}"
               placeholder="Full name">

        <textarea name="bio"
                  placeholder="Write your bio...">{{ user.bio }}</textarea>

        <input type="file"
               name="user_dp_pic"
               accept="image/*">

        <button type="submit">Update Profile</button>

    </form>

</div>

</body>
</html>
