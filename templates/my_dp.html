<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0b0018;
    color:white;
    height:100vh;
    overflow:hidden;
}

/* layout */
.container{
    display:flex;
    height:100vh;
}

/* sidebar */
.sidebar{
    width:35%;
    background:#12002b;
    border-right:1px solid #2de2e6;
    overflow-y:auto;
}

.sidebar h2{
    padding:15px;
    color:#7cf7ff;
    border-bottom:1px solid #2de2e6;
}

.buddy{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px;
    cursor:pointer;
    border-bottom:1px solid #1c0040;
}

.buddy:hover{
    background:#1a0038;
}

.buddy img{
    width:50px;
    height:50px;
    border-radius:50%;
    border:2px solid #2de2e6;
}

/* unread badge */
.user-badge{
    position:absolute;
    top:-2px;
    right:-2px;
    background:red;
    color:white;
    width:18px;
    height:18px;
    border-radius:50%;
    font-size:11px;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* chat area */
.chat-area{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* HEADER */
.chat-header{
    padding:15px;
    border-bottom:1px solid #2de2e6;
    background:#12002b;

    display:flex;
    align-items:center;
    gap:10px;

    position:sticky;
    top:0;
    z-index:1000;
}

.chat-header img{
    width:40px;
    height:40px;
    border-radius:50%;
}

/* chat box */
.chat-box{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

/* messages */
.msg{
    max-width:75%;
    padding:10px;
    border-radius:12px;
    margin-bottom:12px;
    word-wrap:break-word;
}

.me{
    background:#2de2e6;
    color:black;
    margin-left:auto;
}

.them{
    background:#1f0045;
    border:1px solid #2de2e6;
}

/* input */
.input{
    display:flex;
    padding:10px;
    gap:8px;
    border-top:1px solid #2de2e6;
    background:#12002b;
}

.input input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:25px;
    background:#1f0045;
    color:white;
}

.input button{
    padding:12px 18px;
    border:none;
    border-radius:25px;
    background:#2de2e6;
    color:black;
    cursor:pointer;
}

.clear-btn{
    border:none;
    padding:12px;
    background:#1f0045;
    color:white;
    cursor:pointer;
    border-top:1px solid #2de2e6;
    width:100%;
}

/* MOBILE FIX (WhatsApp style) */
@media(max-width:768px){

    .sidebar{
        width:100%;
        height:100vh;
    }

    .chat-area{
        display:none;
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100vh;
        background:#0b0018;
        z-index:999;
    }

    .chat-area.active{
        display:flex;
        flex-direction:column;
    }

    .sidebar.hide{
        display:none;
    }

    /* important scrolling fix */
    .chat-box{
        flex:1;
        overflow-y:auto;
        padding-bottom:140px;
    }

    /* fixed input like WhatsApp */
    .input{
        position:fixed;
        bottom:55px;
        left:0;
        right:0;
        z-index:1000;
    }

    /* ALWAYS visible clear button */
    .clear-btn{
        position:fixed;
        bottom:0;
        left:0;
        right:0;
        height:55px;
        z-index:1001;
        border-radius:0;
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <h2>Chats</h2>
        <div id="buddies"></div>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-area" id="chatArea">

        <div class="chat-header" id="activeUser">
            Select a user
        </div>

        <div class="chat-box" id="chat"></div>

        <div class="input">
            <input id="msg" placeholder="Type message...">
            <button onclick="send()">Send</button>
        </div>

        <button class="clear-btn" onclick="clearChat()">
            Clear Chat
        </button>

    </div>

</div>

<script>

let myId="{{ session.get('user_id') }}";
let currentUser=null;

/* load buddies */
function loadBuddies(){
fetch("/mutual_buddies")
.then(r=>r.json())
.then(data=>{

let html="";

data.users.forEach(u=>{
html+=`
<div class="buddy" onclick="selectUser(${u.id},'${u.name}','${u.dp}')">

    <div style="position:relative;">

        <img src="/uploads/user_dp/${u.dp}"
             onerror="this.src='/uploads/default_avatar.jpeg'">

        <div class="user-badge" id="badge-${u.id}" style="display:none;">
            0
        </div>

    </div>

    <span>${u.name}</span>

</div>`;
});

document.getElementById("buddies").innerHTML=html;

});
}

/* unread counts */
function loadUnreadCounts(){

fetch("/unread_counts")
.then(r=>r.json())
.then(data=>{

    const users = data.users || {};

    document.querySelectorAll(".user-badge")
    .forEach(b=>b.style.display="none");

    for(let uid in users){

        let badge = document.getElementById(`badge-${uid}`);

        if(badge){
            badge.style.display="flex";
            badge.innerText = users[uid];
        }
    }

});
}

/* select user */
function selectUser(id,name,dp){

currentUser=id;

document.getElementById("activeUser").innerHTML=`
<img src="/uploads/user_dp/${dp}"
     onerror="this.src='/uploads/default_avatar.jpeg'">
<div>${name}</div>
`;

document.getElementById("chatArea").classList.add("active");
document.getElementById("sidebar").classList.add("hide");

loadChat();
}

/* load chat */
function loadChat(){

if(!currentUser)return;

fetch(`/get_messages/${myId}/${currentUser}`)
.then(r=>r.json())
.then(data=>{

let html="";

data.forEach(m=>{
let cls=m.sender==myId?"msg me":"msg them";
html+=`<div class="${cls}">${m.message}</div>`;
});

let box=document.getElementById("chat");
box.innerHTML=html;
box.scrollTop=box.scrollHeight;

});
}

/* send */
function send(){

let msg=document.getElementById("msg").value.trim();

if(!msg||!currentUser)return;

fetch("/send_message",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
receiver_id:currentUser,
message:msg
})
})
.then(()=>{

document.getElementById("msg").value="";
loadChat();

});
}

/* clear chat */
function clearChat(){

if(!currentUser){
    alert("Select a chat first");
    return;
}

if(!confirm("Clear this chat for both users?")) return;

fetch("/clear_chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user1:myId,
user2:currentUser
})
})
.then(()=>{
document.getElementById("chat").innerHTML="";
});

}

/* auto refresh */
setInterval(loadChat,2000);
setInterval(loadUnreadCounts,2000);

loadBuddies();

</script>

</body>
</html>
