<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0b0018;
    color:white;
}

/* MAIN WRAPPER */
.container{
    max-width:700px;
    margin:auto;
}

/* COVER */
.cover{
    height:180px;
    background:linear-gradient(135deg,#2de2e6,#12002b);
}

/* PROFILE HEADER */
.profile{
    background:#12002b;
    padding:15px;
    position:relative;
    border-bottom:1px solid #2de2e6;
}

/* AVATAR */
.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    border:4px solid #2de2e6;
    object-fit:cover;
    position:absolute;
    top:-60px;
    left:20px;
    cursor:pointer;
    background:#000;
}

#fileInput{ display:none; }

/* NAME */
.name{
    margin-left:150px;
    font-size:22px;
    font-weight:bold;
    outline:none;
}

/* BIO */
.bio{
    margin-left:150px;
    margin-top:5px;
    color:#aaa;
    outline:none;
}

/* STATS */
.stats{
    display:flex;
    margin-top:15px;
    gap:10px;
}

.stat{
    flex:1;
    background:#1f0045;
    padding:10px;
    text-align:center;
    border-radius:10px;
    cursor:pointer;
}

/* TABS */
.tabs{
    display:flex;
    margin-top:10px;
    border-bottom:1px solid #2de2e6;
}

.tab{
    flex:1;
    text-align:center;
    padding:10px;
    cursor:pointer;
}

.tab.active{
    background:#1f0045;
}

/* POSTS */
.posts{
    padding:10px;
}

.post{
    background:#12002b;
    border:1px solid #2de2e6;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

/* ABOUT */
.about{
    display:none;
    padding:10px;
    background:#12002b;
}

button{
    background:#2de2e6;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    margin-left:150px;
    margin-top:10px;
}

</style>
</head>

<body>
    <button onclick="window.location.href='/'">home</button>

<div class="container">

    <div class="cover"></div>

    <div class="profile">

        <!-- AVATAR -->
        <img id="avatar"
             class="avatar"
             src="/uploads/user_dp/{{ user.user_dp_pic }}"
             onerror="this.src='/uploads/user_dp/default_avatar.png'">

        <input type="file" id="fileInput" accept="image/*">

        <!-- NAME -->
        <div class="name" contenteditable="true" id="name">
            {{ user.full_name }}
        </div>

        <!-- BIO -->
        <div class="bio" contenteditable="true" id="bio">
            {{ user.bio }}
        </div>

        <button onclick="saveProfile()">change</button>
    



        <!-- STATS -->
        <div class="stats">
            <div class="stat" onclick="goFollowers()">
                BUDDIES <div id="followers">0</div>
            </div>

            <div class="stat" onclick="goFollowing()">
                ADDED <div id="following">0</div>
            </div>

            <div class="stat">
                Posts <div id="postCount">0</div>
            </div>
        </div>

        <!-- TABS -->
        <div class="tabs">
            <div class="tab active" onclick="showTab('posts')">Posts</div>
            <div class="tab" onclick="showTab('about')">About</div>
        </div>

    </div>

    <!-- POSTS -->
    <div class="posts" id="posts"></div>

    <!-- ABOUT -->
    <div class="about" id="about">
        <p>Bio: <span id="aboutBio"></span></p>
    </div>

</div>

<script>

const userId = "{{ session.get('user_id') }}";

/* ---------------- AVATAR CLICK ---------------- */
document.getElementById("avatar").onclick = () => {
    document.getElementById("fileInput").click();
};

/* ---------------- LIVE IMAGE PREVIEW + UPLOAD ---------------- */
document.getElementById("fileInput").onchange = function(){

    let file = this.files[0];
    if(!file) return;

    let reader = new FileReader();
    reader.onload = e => {
        document.getElementById("avatar").src = e.target.result;
    };
    reader.readAsDataURL(file);

    let form = new FormData();
    form.append("user_dp_pic", file);

    fetch("/dp", { method:"POST", body:form })
    .then(loadProfile);
};

/* ---------------- SAVE NAME + BIO ---------------- */
function saveProfile(){

    let form = new FormData();
    form.append("full_name", document.getElementById("name").innerText);
    form.append("bio", document.getElementById("bio").innerText);

    fetch("/dp", { method:"POST", body:form })
    .then(loadProfile);
}

/* ---------------- LOAD POSTS ---------------- */
function loadPosts(){

    fetch("/my_posts")
    .then(r=>r.json())
    .then(data=>{

        document.getElementById("posts").innerHTML =
        data.map(p=>`
            <div class="post">
                <div>${p.content || ""}</div>
                ${p.media ? `<img src="${p.media}" style="width:100%;margin-top:10px;border-radius:10px;">` : ""}
            </div>
        `).join("");

    });
}

/* ---------------- LOAD STATS ---------------- */
function loadStats(){

    fetch(`/user_stats/${userId}`)
    .then(r=>r.json())
    .then(d=>{

        document.getElementById("followers").innerText = d.followers;
        document.getElementById("following").innerText = d.following;
        document.getElementById("postCount").innerText = d.posts;

    });

}

/* ---------------- TABS ---------------- */
function showTab(tab){

    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

    if(tab === "posts"){
        document.getElementById("posts").style.display = "block";
        document.getElementById("about").style.display = "none";
        document.querySelectorAll(".tab")[0].classList.add("active");
    } else {
        document.getElementById("posts").style.display = "none";
        document.getElementById("about").style.display = "block";
        document.querySelectorAll(".tab")[1].classList.add("active");
    }

}

/* ---------------- NAV ---------------- */
function goFollowers(){
    window.location.href = `/followers/${userId}`;
}

function goFollowing(){
    window.location.href = `/following/${userId}`;
}

/* ---------------- INIT ---------------- */
function loadProfile(){
    loadPosts();
    loadStats();

    document.getElementById("aboutBio").innerText =
        document.getElementById("bio").innerText;
}

loadProfile();

</script>

</body>
</html>
