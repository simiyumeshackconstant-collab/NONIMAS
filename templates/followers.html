<!DOCTYPE html>

<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Followers</title>

<style>
body{
    background:#0b0018;
    color:white;
    font-family:Arial;
    margin:0;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 20px;
    background:#12002b;
    border-bottom:1px solid #2de2e6;
}

.top-btn{
    background:#1f0045;
    border:none;
    color:white;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}

.container{
    max-width:600px;
    margin:auto;
    padding:20px;
}

.user-card{
    display:flex;
    align-items:center;
    gap:12px;
    background:#140030;
    border:1px solid #2de2e6;
    border-radius:12px;
    padding:10px;
    margin-bottom:10px;
    cursor:pointer;
}

.user-card:hover{
    background:#1a0040;
}

.avatar{
    width:50px;
    height:50px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #2de2e6;
}

.name{
    color:#7cf7ff;
    font-size:15px;
}

.bio{
    font-size:12px;
    color:#aaa;
}
</style>

</head>

<body>

<div class="header">
    <button class="top-btn" onclick="history.back()">⬅ Back</button>
    <div>👥 Followers</div>
    <button class="top-btn" onclick="location.href='/'">🏠</button>
</div>

<div class="container">

{% if users %}
{% for u in users %} <div class="user-card" onclick="openProfile('{{ u.id }}')"> <img src="/uploads/user_dp/{{ u.user_dp_pic }}" 
              class="avatar"
              onerror="this.src='/uploads/default_avatar.jpeg'">


        <div>
            <div class="name">{{ u.full_name }}</div>
            <div class="bio">{{ u.bio }}</div>
        </div>
    </div>
{% endfor %}


{% else %} <p style="color:#777;text-align:center;">No followers yet</p>
{% endif %}

</div>

<script>
function openProfile(id){
    window.location.href = "/user/" + id;
}
</script>

</body>
</html>
